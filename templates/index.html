<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Concierge - IOAI 2027 Singapore</title>

    <!-- Live2D Dependencies (order matters) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism2.min.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- ============================================================
         MAIN LAYOUT: Left (Chat) | Right (Avatar)
         ============================================================ -->
    <div id="app-layout">

        <!-- LEFT PANEL: Chat & Conversation -->
        <aside id="chat-side">
            <!-- Header / Branding -->
            <div id="chat-header">
                <div class="app-title">
                    <span class="logo-dot"></span>
                    IOAI 2027 AI Concierge
                </div>
            </div>

            <!-- Conversation messages area -->
            <div id="chat-messages">
                <!-- Welcome message -->
                <div class="msg bot">
                    <div class="msg-content">Hello! I'm your AI concierge for IOAI 2027 in Singapore. Ask me anything about the event, travel, food, or local tips!</div>
                </div>
            </div>

            <!-- Input area at bottom of chat panel -->
            <div id="chat-input-area">
                <button id="mic-btn" aria-label="Start voice input" title="Click to speak">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <input
                    type="text"
                    id="chat-input"
                    placeholder="Ask me anything about IOAI 2027..."
                    autocomplete="off"
                >
                <button id="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- RIGHT PANEL: Avatar Display -->
        <main id="avatar-side">
            <!-- Avatar canvas (Live2D renders here) -->
            <div id="avatar-container">
                <canvas id="avatar-canvas"></canvas>
            </div>

            <!-- Status indicator (Thinking / Speaking / Listening) -->
            <div id="avatar-status">
                <span class="status-dot"></span>
                <span>Ready</span>
            </div>

            <!-- Avatar selector -->
            <div id="avatar-selector">
                <button class="avatar-option active" data-avatar="shizuku" title="Female Concierge">
                    <span class="avatar-option-emoji">👩</span>
                </button>
                <button class="avatar-option" data-avatar="koharu" title="Male Concierge">
                    <span class="avatar-option-emoji">👨</span>
                </button>
                <button class="avatar-option" data-avatar="hijiki" title="AI Assistant">
                    <span class="avatar-option-emoji">🤖</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Hidden elements for backward compatibility -->
    <div id="response-bubble" style="display:none"><div id="response-text"></div></div>
    <div id="chat-history" style="display:none"></div>
    <button id="history-toggle" style="display:none"></button>
    <div id="voice-indicator" style="display:none"></div>

    <!-- Scripts -->
    <script src="/static/js/avatar.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/voice.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('[App] Starting AI Concierge...');
            ChatManager.init();
            VoiceManager.init();
            await AvatarManager.init();

            // Avatar selector
            document.querySelectorAll('.avatar-option').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    const avatarId = btn.dataset.avatar;
                    if (avatarId) await AvatarManager.switchAvatar(avatarId);
                });
            });

            console.log('[App] Ready!');
        });
    </script>
</body>
</html>
